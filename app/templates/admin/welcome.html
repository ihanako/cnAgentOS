<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>欢迎页</title>
    <link rel="stylesheet" href="{{ static_url('layui-v2.13.6/layui/css/layui.css') }}">
    <link rel="stylesheet" href="{{ static_url('fontawesome-free-5.15.4-web/css/all.min.css') }}">
    <style>
        .welcome-page {
            padding: 30px;
            background: #f2f3f5;
            min-height: calc(100vh - 60px);
        }
        .welcome-banner {
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            color: #fff;
            padding: 40px;
            border-radius: 10px;
            margin-bottom: 25px;
            box-shadow: 0 4px 15px rgba(30,60,114,0.3);
        }
        .welcome-banner h2 {
            font-size: 26px;
            margin-bottom: 10px;
        }
        .welcome-banner p {
            font-size: 14px;
            opacity: 0.85;
        }
        .stat-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
            gap: 20px;
            margin-bottom: 25px;
        }
        .stat-card {
            background: #fff;
            border-radius: 10px;
            padding: 25px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.06);
            display: flex;
            align-items: center;
            transition: all 0.3s ease;
        }
        .stat-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 25px rgba(0,0,0,0.1);
        }
        .stat-card .icon {
            width: 60px;
            height: 60px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 26px;
            color: #fff;
            margin-right: 20px;
        }
        .stat-card .icon.blue { background: linear-gradient(135deg, #1e3c72, #2a5298); }
        .stat-card .icon.green { background: linear-gradient(135deg, #00b09b, #96c93d); }
        .stat-card .icon.orange { background: linear-gradient(135deg, #f093fb, #f5576c); }
        .stat-card .icon.purple { background: linear-gradient(135deg, #667eea, #764ba2); }
        .stat-card .info h4 {
            font-size: 28px;
            color: #333;
            margin-bottom: 5px;
        }
        .stat-card .info p {
            font-size: 14px;
            color: #999;
        }
        .content-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }
        .content-card {
            background: #fff;
            border-radius: 10px;
            padding: 25px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.06);
        }
        .content-card h3 {
            font-size: 16px;
            color: #333;
            margin-bottom: 20px;
            padding-bottom: 12px;
            border-bottom: 1px solid #eee;
        }
        .content-card h3 i {
            margin-right: 8px;
            color: #1e3c72;
        }
        .quick-links a {
            display: inline-block;
            padding: 8px 16px;
            margin: 5px;
            background: #f0f2f5;
            border-radius: 6px;
            color: #333;
            text-decoration: none;
            font-size: 14px;
            transition: all 0.3s;
        }
        .quick-links a:hover {
            background: #1e3c72;
            color: #fff;
        }
        .sys-info p {
            font-size: 14px;
            color: #666;
            line-height: 2;
        }
        .sys-info p span {
            color: #333;
            font-weight: 500;
        }
        @media (max-width: 768px) {
            .content-grid {
                grid-template-columns: 1fr;
            }
            .stat-grid {
                grid-template-columns: 1fr 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="welcome-page">
        <div class="welcome-banner">
            <h2><i class="fas fa-rocket"></i> 欢迎使用 cnAgentOS 管理后台</h2>
            <p>AI智能瞭望与智能问数系统 · 让数据驱动决策</p>
        </div>

        <div class="stat-grid">
            <div class="stat-card">
                <div class="icon blue"><i class="fas fa-users"></i></div>
                <div class="info">
                    <h4>--</h4>
                    <p>用户总数</p>
                </div>
            </div>
            <div class="stat-card">
                <div class="icon green"><i class="fas fa-comments"></i></div>
                <div class="info">
                    <h4>--</h4>
                    <p>问数次数</p>
                </div>
            </div>
            <div class="stat-card">
                <div class="icon orange"><i class="fas fa-database"></i></div>
                <div class="info">
                    <h4>--</h4>
                    <p>数据源数量</p>
                </div>
            </div>
            <div class="stat-card">
                <div class="icon purple"><i class="fas fa-chart-line"></i></div>
                <div class="info">
                    <h4>--</h4>
                    <p>今日访问</p>
                </div>
            </div>
        </div>

        <div class="content-grid">
            <div class="content-card">
                <h3><i class="fas fa-bolt"></i> 快捷入口</h3>
                <div class="quick-links">
                    <a href="javascript:;" data-parent-url="/admin/user/list"><i class="fas fa-user-plus"></i> 新增用户</a>
                    <a href="javascript:;" data-parent-url="/admin/user/list"><i class="fas fa-users"></i> 用户管理</a>
                    <a href="javascript:;"><i class="fas fa-cog"></i> 系统设置</a>
                </div>
            </div>
            <div class="content-card">
                <h3><i class="fas fa-info-circle"></i> 系统信息</h3>
                <div class="sys-info">
                    <p>系统名称: <span>cnAgentOS</span></p>
                    <p>系统版本: <span>V1.0.0</span></p>
                    <p>运行环境: <span>Python 3.13 + Tornado 6.5.5</span></p>
                    <p>数据库: <span>SQLite3</span></p>
                </div>
            </div>
        </div>
    </div>

    <script src="{{ static_url('layui-v2.13.6/layui/layui.js') }}"></script>
    <script>
        layui.use(['jquery'], function() {
            var $ = layui.jquery;
            $('.quick-links a').on('click', function() {
                var url = $(this).data('parent-url');
                if (url && window.parent !== window) {
                    window.parent.$('#mainContent').attr('src', url);
                }
            });
        });
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ title }} - cnAgentOS</title>
    <link rel="stylesheet" href="{{ static_url('layui-v2.13.6/layui/css/layui.css') }}">
    <link rel="stylesheet" href="{{ static_url('fontawesome-free-5.15.4-web/css/all.min.css') }}">
    <style>
        .layui-layout-admin .layui-header {
            background: #1e3c72;
            box-shadow: 0 2px 8px rgba(0,0,0,0.15);
        }
        .layui-layout-admin .layui-header .layui-logo {
            color: #fff;
            font-size: 18px;
            font-weight: 600;
            letter-spacing: 1px;
            box-shadow: none;
            background: transparent;
        }
        .layui-layout-admin .layui-header .layui-logo i {
            margin-right: 8px;
        }
        .layui-layout-admin .layui-header .layui-nav {
            background: transparent;
        }
        .layui-layout-admin .layui-header .layui-nav .layui-nav-item a {
            color: rgba(255,255,255,0.85);
        }
        .layui-layout-admin .layui-header .layui-nav .layui-nav-item a:hover {
            color: #fff;
            background: rgba(255,255,255,0.1);
        }
        .layui-layout-admin .layui-header .layui-nav .layui-this a {
            color: #fff;
        }
        .layui-layout-admin .layui-header .layui-nav .layui-nav-more {
            border-top-color: rgba(255,255,255,0.7);
        }
        .layui-layout-admin .layui-header .layui-nav .layui-nav-mored {
            border-color: transparent transparent rgba(255,255,255,0.7);
        }
        .layui-layout-admin .layui-side {
            box-shadow: 2px 0 8px rgba(0,0,0,0.1);
        }
        .layui-layout-admin .layui-side .layui-logo {
            background: #0f2548;
            color: #fff;
        }
        .layui-layout-admin .layui-side .layui-nav {
            background: #1e3c72;
        }
        .layui-layout-admin .layui-side .layui-nav .layui-nav-item a {
            color: rgba(255,255,255,0.85);
        }
        .layui-layout-admin .layui-side .layui-nav .layui-nav-item.layui-this {
            background: rgba(255,255,255,0.15);
        }
        .layui-layout-admin .layui-side .layui-nav .layui-nav-item.layui-this a {
            color: #fff;
        }
        .layui-layout-admin .layui-side .layui-nav .layui-nav-item a:hover {
            background: rgba(255,255,255,0.1);
            color: #fff;
        }
        .layui-layout-admin .layui-side .layui-nav .layui-nav-child dd.layui-this {
            background: rgba(255,255,255,0.1);
        }
        .layui-layout-admin .layui-side .layui-nav .layui-nav-child dd.layui-this a {
            color: #fff;
        }
        .layui-layout-admin .layui-side .layui-nav .layui-nav-child a {
            color: rgba(255,255,255,0.75);
        }
        .layui-layout-admin .layui-side .layui-nav .layui-nav-more {
            border-top-color: rgba(255,255,255,0.7);
        }
        .layui-layout-admin .layui-side .layui-nav .layui-nav-mored {
            border-color: transparent transparent rgba(255,255,255,0.7);
        }
        .layui-layout-admin .layui-body {
            background: #f2f3f5;
            padding: 0;
        }
        .admin-iframe {
            width: 100%;
            height: 100%;
            border: none;
        }
        .welcome-page {
            padding: 40px;
            background: #f2f3f5;
            min-height: 100%;
        }
        .welcome-card {
            background: #fff;
            border-radius: 8px;
            padding: 30px;
            margin-bottom: 20px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.08);
        }
        .welcome-card h3 {
            font-size: 18px;
            color: #333;
            margin-bottom: 20px;
            padding-bottom: 12px;
            border-bottom: 1px solid #eee;
        }
        .welcome-card h3 i {
            margin-right: 8px;
            color: #1e3c72;
        }
        .stat-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 20px;
        }
        .stat-item {
            background: linear-gradient(135deg, #1e3c72, #2a5298);
            color: #fff;
            padding: 20px;
            border-radius: 8px;
            text-align: center;
        }
        .stat-item .num {
            font-size: 32px;
            font-weight: bold;
            margin-bottom: 8px;
        }
        .stat-item .label {
            font-size: 14px;
            opacity: 0.85;
        }
    </style>
</head>
<body class="layui-layout-body">
    <div class="layui-layout layui-layout-admin">
        <div class="layui-header">
            <div class="layui-logo">
                <i class="fas fa-shield-alt"></i>cnAgentOS 管理后台
            </div>
            <ul class="layui-nav layui-layout-right">
                <li class="layui-nav-item">
                    <a href="javascript:;">
                        <i class="fas fa-user-circle"></i>
                        <span>{{ username }}</span>
                    </a>
                </li>
                <li class="layui-nav-item">
                    <a href="javascript:;" id="logoutBtn">
                        <i class="fas fa-sign-out-alt"></i> 退出
                    </a>
                </li>
            </ul>
        </div>

        <div class="layui-side layui-bg-black">
            <div class="layui-side-scroll">
                <ul class="layui-nav layui-nav-tree" lay-filter="admin-menu" lay-accordion="true">
                    <li class="layui-nav-item layui-this">
                        <a href="javascript:;" data-url="/admin/welcome" data-title="首页">
                            <i class="fas fa-home"></i>
                            <span>首页</span>
                        </a>
                    </li>
                    <li class="layui-nav-item">
                        <a href="javascript:;">
                            <i class="fas fa-users"></i>
                            <span>用户管理</span>
                        </a>
                        <dl class="layui-nav-child">
                            <dd><a href="javascript:;" data-url="/admin/user/list" data-title="用户列表">用户列表</a></dd>
                        </dl>
                    </li>
                    <li class="layui-nav-item">
                        <a href="javascript:;">
                            <i class="fas fa-cogs"></i>
                            <span>系统管理</span>
                        </a>
                        <dl class="layui-nav-child">
                            <dd><a href="javascript:;" data-url="/admin/menu/list" data-title="功能管理">功能管理</a></dd>
                            <dd><a href="javascript:;" data-url="/admin/role/list" data-title="角色管理">角色管理</a></dd>
                            <dd><a href="javascript:;" data-url="/admin/permission/list" data-title="权限管理">权限管理</a></dd>
                        </dl>
                    </li>
                </ul>
            </div>
        </div>

        <div class="layui-body">
            <iframe id="mainContent" src="/admin/welcome" class="admin-iframe"></iframe>
        </div>

        <div class="layui-footer" style="text-align: center; background: #fff; color: #999; font-size: 12px; padding: 10px;">
            &copy; 2026 cnAgentOS - AI智能瞭望与智能问数系统
        </div>
    </div>

    <form id="logoutForm" action="/admin/logout" method="post" style="display:none;">
        {% module xsrf_form_html() %}
    </form>

    <script src="{{ static_url('layui-v2.13.6/layui/layui.js') }}"></script>
    <script>
        layui.use(['element', 'jquery', 'layer'], function() {
            var element = layui.element;
            var $ = layui.jquery;
            var layer = layui.layer;

            $(document).on('click', '[data-url]', function() {
                var url = $(this).data('url');
                var title = $(this).data('title');
                if (url && url !== '#') {
                    $('#mainContent').attr('src', url);
                } else {
                    layer.msg('功能开发中...');
                }
            });

            $('#logoutBtn').on('click', function() {
                layer.confirm('确定要退出登录吗?', {icon: 3, title: '提示'}, function(index) {
                    $('#logoutForm').submit();
                    layer.close(index);
                });
            });
        });
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>用户管理</title>
    <link rel="stylesheet" href="{{ static_url('layui-v2.13.6/layui/css/layui.css') }}">
    <link rel="stylesheet" href="{{ static_url('fontawesome-free-5.15.4-web/css/all.min.css') }}">
    <style>
        body { padding: 15px; background: #f2f3f5; }
        .search-bar { background: #fff; padding: 15px; border-radius: 6px; margin-bottom: 15px; box-shadow: 0 1px 4px rgba(0,0,0,0.05); }
        .table-container { background: #fff; padding: 15px; border-radius: 6px; box-shadow: 0 1px 4px rgba(0,0,0,0.05); }
        .status-badge { padding: 3px 10px; border-radius: 20px; font-size: 12px; }
        .status-normal { background: #e8f5e9; color: #4caf50; }
        .status-disabled { background: #ffebee; color: #f44336; }
        .admin-badge { background: #e3f2fd; color: #2196f3; padding: 3px 10px; border-radius: 20px; font-size: 12px; }
    </style>
</head>
<body>
    <div class="search-bar">
        <form class="layui-form" lay-filter="searchForm">
            <div class="layui-form-item" style="margin-bottom: 0;">
                <div class="layui-inline">
                    <input type="text" name="keyword" placeholder="搜索用户名/邮箱/手机号" class="layui-input" style="width: 260px;">
                </div>
                <div class="layui-inline">
                    <button class="layui-btn layui-btn-normal" lay-submit lay-filter="searchBtn">
                        <i class="fas fa-search"></i> 搜索
                    </button>
                    <button type="reset" class="layui-btn layui-btn-primary">
                        <i class="fas fa-redo"></i> 重置
                    </button>
                </div>
            </div>
        </form>
    </div>

    <div class="table-container">
        <table id="userTable" lay-filter="userTable"></table>
    </div>
    
    <div id="xsrf-token-container" style="display:none;">{% module xsrf_form_html() %}</div>

    <script type="text/html" id="toolbarDemo">
        <div class="layui-btn-container">
            <button class="layui-btn layui-btn-sm" lay-event="add">
                <i class="fas fa-plus"></i> 新增用户
            </button>
            <button class="layui-btn layui-btn-sm layui-btn-danger" lay-event="batchDelete">
                <i class="fas fa-trash-alt"></i> 批量删除
            </button>
        </div>
    </script>

    <script type="text/html" id="actionTpl">
        <a class="layui-btn layui-btn-xs" lay-event="edit">
            <i class="fas fa-edit"></i> 编辑
        </a>
        <a class="layui-btn layui-btn-xs layui-btn-danger" lay-event="delete">
            <i class="fas fa-trash-alt"></i> 删除
        </a>
    </script>

    <script src="{{ static_url('layui-v2.13.6/layui/layui.js') }}"></script>
    <script>
        layui.use(['table', 'form', 'layer', 'jquery', 'laypage'], function() {
            var table = layui.table;
            var form = layui.form;
            var layer = layui.layer;
            var $ = layui.jquery;
            
            var xsrfToken = $('input[name="_xsrf"]').val();
            function getXsrfData() {
                return { '_xsrf': xsrfToken };
            }

            table.render({
                elem: '#userTable',
                url: '/admin/api/user/list',
                toolbar: '#toolbarDemo',
                defaultToolbar: ['filter', 'exports'],
                cols: [[
                    {type: 'checkbox', fixed: 'left'},
                    {field: 'id', title: 'ID', width: 80, sort: true, fixed: 'left'},
                    {field: 'username', title: '用户名', width: 150, sort: true},
                    {field: 'email', title: '邮箱', width: 200},
                    {field: 'phone', title: '手机号', width: 150},
                    {field: 'status', title: '状态', width: 100, templet: function(d) {
                        return d.status === 1 ? '<span class="status-badge status-normal">正常</span>' : '<span class="status-badge status-disabled">禁用</span>';
                    }, align: 'center'},
                    {field: 'is_admin', title: '角色', width: 120, templet: function(d) {
                        return d.is_admin === 1 ? '<span class="admin-badge">管理员</span>' : '<span style="color: #999;">普通用户</span>';
                    }, align: 'center'},
                    {field: 'create_at', title: '创建时间', width: 180, sort: true},
                    {field: 'update_at', title: '更新时间', width: 180, sort: true},
                    {title: '操作', width: 180, toolbar: '#actionTpl', fixed: 'right', align: 'center'}
                ]],
                page: {
                    limit: 20,
                    limits: [10, 20, 50, 100],
                    layout: ['count', 'prev', 'page', 'next', 'limit', 'skip']
                },
                parseData: function(res) {
                    return {
                        "code": res.code,
                        "msg": res.msg,
                        "count": res.count,
                        "data": res.data
                    };
                },
                request: {
                    pageName: 'page',
                    limitName: 'limit'
                },
                height: 'full-200'
            });

            form.on('submit(searchBtn)', function(data) {
                table.reload('userTable', {
                    where: data.field,
                    page: {curr: 1}
                });
                return false;
            });

            table.on('toolbar(userTable)', function(obj) {
                switch(obj.event) {
                    case 'add':
                        showUserForm(null);
                        break;
                    case 'batchDelete':
                        var checkStatus = table.checkStatus('userTable');
                        var data = checkStatus.data;
                        if (data.length === 0) {
                            layer.msg('请选择要删除的用户');
                            return;
                        }
                        layer.confirm('确定要删除选中的 ' + data.length + ' 个用户吗？', {icon: 3, title: '提示'}, function(index) {
                            var ids = data.map(function(item) { return item.id; }).join(',');
                            $.post('/admin/api/user/batch_delete', $.extend({ids: ids}, getXsrfData()), function(res) {
                                if (res.code === 0) {
                                    layer.msg(res.msg, {icon: 1});
                                    table.reload('userTable');
                                } else {
                                    layer.msg(res.msg, {icon: 2});
                                }
                            }, 'json');
                            layer.close(index);
                        });
                        break;
                }
            });

            table.on('tool(userTable)', function(obj) {
                var data = obj.data;
                switch(obj.event) {
                    case 'edit':
                        showUserForm(data);
                        break;
                    case 'delete':
                        layer.confirm('确定要删除用户 "' + data.username + '" 吗？', {icon: 3, title: '提示'}, function(index) {
                            $.post('/admin/api/user/delete', $.extend({id: data.id}, getXsrfData()), function(res) {
                                if (res.code === 0) {
                                    layer.msg(res.msg, {icon: 1});
                                    table.reload('userTable');
                                } else {
                                    layer.msg(res.msg, {icon: 2});
                                }
                            }, 'json');
                            layer.close(index);
                        });
                        break;
                }
            });

            function showUserForm(data) {
                var isEdit = data !== null;
                var html = '<form class="layui-form" id="userForm" lay-filter="userForm" style="padding: 20px;">' +
                    '<input type="hidden" name="id" value="">' +
                    '<div class="layui-form-item">' +
                    '<label class="layui-form-label">用户名</label>' +
                    '<div class="layui-input-block">' +
                    '<input type="text" name="username" required lay-verify="required" placeholder="请输入用户名" class="layui-input" autocomplete="off">' +
                    '</div></div>' +
                    '<div class="layui-form-item">' +
                    '<label class="layui-form-label">密码</label>' +
                    '<div class="layui-input-block">' +
                    '<input type="password" name="password" id="passwordInput" placeholder="请输入密码（不修改则留空）" class="layui-input" autocomplete="new-password">' +
                    '<div class="layui-form-mid layui-word-aux">新增时必填，修改时留空表示不修改密码</div>' +
                    '</div></div>' +
                    '<div class="layui-form-item">' +
                    '<label class="layui-form-label">邮箱</label>' +
                    '<div class="layui-input-block">' +
                    '<input type="email" name="email" placeholder="请输入邮箱" class="layui-input">' +
                    '</div></div>' +
                    '<div class="layui-form-item">' +
                    '<label class="layui-form-label">手机号</label>' +
                    '<div class="layui-input-block">' +
                    '<input type="text" name="phone" placeholder="请输入手机号" class="layui-input">' +
                    '</div></div>' +
                    '<div class="layui-form-item">' +
                    '<label class="layui-form-label">用户状态</label>' +
                    '<div class="layui-input-block">' +
                    '<input type="radio" name="status" value="1" title="正常" checked>' +
                    '<input type="radio" name="status" value="0" title="禁用">' +
                    '</div></div>' +
                    '<div class="layui-form-item">' +
                    '<label class="layui-form-label">管理员</label>' +
                    '<div class="layui-input-block">' +
                    '<input type="checkbox" name="is_admin" lay-skin="switch" lay-text="是|否" value="1">' +
                    '</div></div>' +
                    '<div class="layui-form-item">' +
                    '<div class="layui-input-block">' +
                    '<button class="layui-btn" lay-submit lay-filter="submitForm">确定</button>' +
                    '<button type="reset" class="layui-btn layui-btn-primary">重置</button>' +
                    '</div></div>' +
                    '</form>';
                
                layer.open({
                    type: 1,
                    title: isEdit ? '编辑用户' : '新增用户',
                    area: ['500px', '550px'],
                    content: html,
                    success: function(layero, index) {
                        form.render();
                        if (isEdit) {
                            $.get('/admin/api/user/edit', {id: data.id}, function(res) {
                                if (res.code === 0) {
                                    var formData = res.data;
                                    formData.is_admin = formData.is_admin === 1 ? true : false;
                                    form.val('userForm', formData);
                                    $('#passwordInput').attr('placeholder', '留空表示不修改密码');
                                    $('input[name="username"]').prop('readonly', true);
                                }
                            }, 'json');
                        } else {
                            $('#passwordInput').attr('placeholder', '请输入密码').prop('required', true);
                        }
                    }
                });

                form.on('submit(submitForm)', function(formData) {
                    var field = formData.field;
                    var url = isEdit ? '/admin/api/user/edit' : '/admin/api/user/add';
                    field.id = isEdit ? data.id : '';
                    field._xsrf = xsrfToken;
                    
                    if (!isEdit && !field.password) {
                        layer.msg('密码不能为空', {icon: 2});
                        return false;
                    }
                    
                    $.post(url, field, function(res) {
                        if (res.code === 0) {
                            layer.msg(res.msg, {icon: 1});
                            layer.closeAll();
                            table.reload('userTable');
                        } else {
                            layer.msg(res.msg, {icon: 2});
                        }
                    }, 'json');
                    return false;
                });
            }
        });
    </script>
</body>
</html>

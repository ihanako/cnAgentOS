<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>模型引擎</title>
    <link rel="stylesheet" href="{{ static_url('layui-v2.13.6/layui/css/layui.css') }}">
    <link rel="stylesheet" href="{{ static_url('fontawesome-free-5.15.4-web/css/all.min.css') }}">
    <style>
        body { padding: 20px; background: #0b1120; color: #e2e8f0; font-family: 'Segoe UI', system-ui, sans-serif; }
        .page-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; background: #1e293b; padding: 20px; border-radius: 12px; border: 1px solid #334155; box-shadow: 0 4px 20px rgba(0,0,0,0.3); }
        .page-title { font-size: 24px; font-weight: 700; background: linear-gradient(135deg, #60a5fa, #a78bfa); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .page-actions { display: flex; gap: 12px; }
        .search-input { background: #0f172a; border: 1px solid #334155; color: #fff; padding: 8px 15px; border-radius: 6px; width: 240px; outline: none; }
        .search-input:focus { border-color: #3b82f6; box-shadow: 0 0 0 2px rgba(59,130,246,0.2); }
        
        .model-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 24px; }
        @media (max-width: 1400px) { .model-grid { grid-template-columns: repeat(2, 1fr); } }
        @media (max-width: 900px) { .model-grid { grid-template-columns: 1fr; } }
        
        .model-card {
            background: linear-gradient(145deg, #1e293b, #0f172a);
            border: 1px solid #334155;
            border-radius: 16px;
            padding: 24px;
            position: relative;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            overflow: hidden;
        }
        .model-card:hover { transform: translateY(-5px); box-shadow: 0 10px 30px rgba(59, 130, 246, 0.15); border-color: #3b82f6; }
        .model-card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 4px; background: linear-gradient(90deg, #3b82f6, #8b5cf6, #ec4899); opacity: 0.8; }
        .model-card.is-default::after { content: '默认模型'; position: absolute; top: 12px; right: 12px; background: linear-gradient(90deg, #f59e0b, #d97706); color: #fff; font-size: 11px; padding: 2px 8px; border-radius: 10px; font-weight: 600; box-shadow: 0 2px 8px rgba(245,158,11,0.4); animation: glow 2s infinite alternate; }
        @keyframes glow { from { box-shadow: 0 2px 8px rgba(245,158,11,0.4); } to { box-shadow: 0 2px 15px rgba(245,158,11,0.7); } }
        
        .card-header { display: flex; align-items: center; gap: 16px; margin-bottom: 16px; }
        .model-icon { width: 48px; height: 48px; background: linear-gradient(135deg, #3b82f6, #8b5cf6); border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 20px; color: #fff; }
        .model-name { font-size: 18px; font-weight: 700; color: #f8fafc; }
        .model-status { font-size: 12px; padding: 2px 8px; border-radius: 6px; margin-top: 4px; display: inline-block; }
        .status-active { background: rgba(34, 197, 94, 0.2); color: #22c55e; border: 1px solid rgba(34, 197, 94, 0.3); }
        .status-inactive { background: rgba(239, 68, 68, 0.2); color: #ef4444; border: 1px solid rgba(239, 68, 68, 0.3); }
        
        .card-body { margin-bottom: 20px; }
        .info-row { display: flex; justify-content: space-between; font-size: 13px; color: #94a3b8; margin-bottom: 6px; }
        .info-val { color: #e2e8f0; font-family: 'Consolas', monospace; max-width: 160px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        
        .stats-container { display: flex; gap: 16px; margin: 20px 0; padding: 12px; background: rgba(0,0,0,0.2); border-radius: 10px; }
        .stat-item { flex: 1; text-align: center; }
        .stat-num { font-size: 20px; font-weight: 700; color: #fff; }
        .stat-label { font-size: 11px; color: #64748b; margin-top: 2px; }
        .token-bar { height: 4px; background: #334155; border-radius: 2px; margin-top: 6px; overflow: hidden; }
        .token-fill { height: 100%; background: linear-gradient(90deg, #3b82f6, #8b5cf6); border-radius: 2px; width: 0%; transition: width 0.5s; }
        
        .card-footer { display: flex; justify-content: space-between; gap: 8px; margin-top: auto; padding-top: 16px; border-top: 1px solid #334155; }
        .btn-action { flex: 1; padding: 8px; border: none; border-radius: 8px; cursor: pointer; font-size: 13px; font-weight: 500; transition: all 0.2s; display: flex; align-items: center; justify-content: center; gap: 6px; }
        .btn-edit { background: #334155; color: #e2e8f0; }
        .btn-edit:hover { background: #475569; }
        .btn-test { background: linear-gradient(90deg, #3b82f6, #8b5cf6); color: #fff; }
        .btn-test:hover { opacity: 0.9; transform: scale(1.02); }
        .btn-default { background: #d97706; color: #fff; }
        .btn-default:hover { background: #b45309; }
        .btn-delete { background: #ef4444; color: #fff; }
        .btn-delete:hover { background: #dc2626; }
        
        .layui-btn { background: linear-gradient(90deg, #3b82f6, #8b5cf6); border: none; font-weight: 600; }
        .layui-btn:hover { opacity: 0.9; }
        .layui-input, .layui-textarea, .layui-select { background: #0f172a; border-color: #334155; color: #fff; }
        .layui-input:focus, .layui-textarea:focus { border-color: #3b82f6; }
        .layui-form-label { color: #e2e8f0; }
        
        .chat-container { height: 350px; overflow-y: auto; padding: 15px; background: #0b1120; border-radius: 8px; margin-bottom: 15px; border: 1px solid #334155; }
        .chat-msg { margin-bottom: 15px; display: flex; }
        .chat-msg.user { justify-content: flex-end; }
        .chat-bubble { max-width: 80%; padding: 10px 14px; border-radius: 12px; font-size: 14px; line-height: 1.5; }
        .chat-msg.user .chat-bubble { background: #3b82f6; color: #fff; border-bottom-right-radius: 2px; }
        .chat-msg.ai .chat-bubble { background: #1e293b; color: #e2e8f0; border: 1px solid #334155; border-bottom-left-radius: 2px; }
        .chat-loading { color: #64748b; font-size: 13px; padding: 10px; display: flex; align-items: center; gap: 8px; }
        .chat-loading::before { content: ''; width: 16px; height: 16px; border: 2px solid #3b82f6; border-top-color: transparent; border-radius: 50%; animation: spin 0.8s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
        
        .pagination-wrap { margin-top: 30px; text-align: center; }
    </style>
</head>
<body>
    <div class="page-header">
        <div class="page-title"><i class="fas fa-brain"></i> 模型引擎管理</div>
        <div class="page-actions">
            <input type="text" id="keyword" class="search-input" placeholder="搜索模型名称/编码...">
            <button class="layui-btn" id="addBtn"><i class="fas fa-plus"></i> 新增模型</button>
        </div>
    </div>

    <div class="model-grid" id="modelGrid"></div>
    
    <div class="pagination-wrap" id="pagination"></div>
    
    <div id="xsrf-token-container" style="display:none;">{% module xsrf_form_html() %}</div>

    <script src="{{ static_url('layui-v2.13.6/layui/layui.js') }}"></script>
    <script>
        layui.use(['layer', 'jquery', 'form'], function() {
            var layer = layui.layer;
            var $ = layui.jquery;
            var form = layui.form;
            var xsrfToken = $('input[name="_xsrf"]').val();
            var currentPage = 1;
            var totalPages = 1;

            function renderPage(page) {
                currentPage = page;
                var keyword = $('#keyword').val();
                $.get('/admin/api/model/list', { page: page, limit: 18, keyword: keyword }, function(res) {
                    if (res.code === 0) {
                        totalPages = Math.ceil(res.count / 18) || 1;
                        var html = '';
                        if (res.data.length === 0) {
                            html = '<div style="grid-column:1/-1;text-align:center;padding:50px;color:#64748b;font-size:16px;"><i class="fas fa-box-open" style="font-size:40px;margin-bottom:15px;display:block;"></i>暂无模型数据，请点击新增添加</div>';
                        } else {
                            res.data.forEach(function(m) {
                                html += '<div class="model-card ' + (m.is_default ? 'is-default' : '') + '">' +
                                    '<div class="card-header">' +
                                        '<div class="model-icon"><i class="fas fa-robot"></i></div>' +
                                        '<div><div class="model-name">' + m.name + '</div>' +
                                        '<span class="model-status ' + (m.status ? 'status-active' : 'status-inactive') + '">' + (m.status ? '运行中' : '已停用') + '</span></div>' +
                                    '</div>' +
                                    '<div class="card-body">' +
                                        '<div class="info-row"><span>Base URL</span><span class="info-val" title="' + m.base_url + '">' + m.base_url + '</span></div>' +
                                        '<div class="info-row"><span>Model Name</span><span class="info-val">' + m.model_name + '</span></div>' +
                                        '<div class="stats-container">' +
                                            '<div class="stat-item"><div class="stat-num">' + (m.total_calls || 0) + '</div><div class="stat-label">调用次数</div></div>' +
                                            '<div class="stat-item"><div class="stat-num">' + formatNum(m.total_tokens || 0) + '</div><div class="stat-label">Token消耗</div><div class="token-bar"><div class="token-fill" style="width:' + Math.min((m.total_tokens / 1000000) * 100, 100) + '%"></div></div></div>' +
                                        '</div>' +
                                    '</div>' +
                                    '<div class="card-footer">' +
                                        '<button class="btn-action btn-edit" onclick="editModel(' + m.id + ')"><i class="fas fa-edit"></i> 编辑</button>' +
                                        '<button class="btn-action btn-test" onclick="testModel(' + m.id + ',\'' + m.name + '\')"><i class="fas fa-comment-dots"></i> 测试</button>' +
                                        (m.is_default ? '<button class="btn-action btn-default" disabled><i class="fas fa-star"></i> 默认</button>' : '<button class="btn-action btn-default" onclick="setDefault(' + m.id + ')"><i class="fas fa-star"></i> 设为默认</button>') +
                                        '<button class="btn-action btn-delete" onclick="deleteModel(' + m.id + ',\'' + m.name + '\')"><i class="fas fa-trash"></i></button>' +
                                    '</div>' +
                                '</div>';
                            });
                        }
                        $('#modelGrid').html(html);
                        renderPagination(res.count);
                    }
                }, 'json');
            }

            function renderPagination(total) {
                var html = '<div style="display:inline-flex;gap:8px;">';
                html += '<button class="layui-btn layui-btn-sm ' + (currentPage <= 1 ? 'layui-btn-disabled' : '') + '" onclick="goPage(' + (currentPage - 1) + ')" ' + (currentPage <= 1 ? 'disabled' : '') + '><i class="fas fa-chevron-left"></i></button>';
                for (var i = 1; i <= totalPages && i <= 10; i++) {
                    html += '<button class="layui-btn layui-btn-sm ' + (i === currentPage ? '' : 'layui-btn-primary') + '" style="background:' + (i === currentPage ? '#3b82f6' : '#1e293b') + ';border:none;" onclick="goPage(' + i + ')">' + i + '</button>';
                }
                html += '<button class="layui-btn layui-btn-sm ' + (currentPage >= totalPages ? 'layui-btn-disabled' : '') + '" onclick="goPage(' + (currentPage + 1) + ')" ' + (currentPage >= totalPages ? 'disabled' : '') + '><i class="fas fa-chevron-right"></i></button>';
                html += '<span style="color:#94a3b8;line-height:30px;margin-left:10px;font-size:13px;">共 ' + total + ' 条</span></div>';
                $('#pagination').html(html);
            }

            window.goPage = function(p) { if (p > 0 && p <= totalPages) renderPage(p); };
            window.formatNum = function(n) { return n > 1000 ? (n / 1000).toFixed(1) + 'k' : n; };

            $('#keyword').on('keypress', function(e) { if (e.which === 13) renderPage(1); });
            $('#addBtn').on('click', function() { showForm(null); });

            window.editModel = function(id) {
                $.get('/admin/api/model/edit', {id: id}, function(res) {
                    if (res.code === 0) showForm(res.data);
                }, 'json');
            };

            window.deleteModel = function(id, name) {
                layer.confirm('确定删除模型 "' + name + '"？', {icon: 3, title: '警告'}, function(idx) {
                    $.post('/admin/api/model/delete', $.extend({id: id}, {_xsrf: xsrfToken}), function(res) {
                        layer.msg(res.msg, {icon: res.code === 0 ? 1 : 2});
                        if (res.code === 0) renderPage(currentPage);
                    }, 'json');
                    layer.close(idx);
                });
            };

            window.setDefault = function(id) {
                $.post('/admin/api/model/default', $.extend({id: id}, {_xsrf: xsrfToken}), function(res) {
                    layer.msg(res.msg, {icon: res.code === 0 ? 1 : 2});
                    if (res.code === 0) renderPage(currentPage);
                }, 'json');
            };

            window.testModel = function(id, name) {
                var html = '<div class="chat-container" id="chatBox"></div>' +
                    '<div style="display:flex;gap:8px;">' +
                    '<input type="text" id="chatInput" class="layui-input" placeholder="输入测试消息..." style="flex:1;">' +
                    '<button class="layui-btn" id="sendBtn"><i class="fas fa-paper-plane"></i> 发送</button></div>';
                layer.open({
                    type: 1, title: '对话测试 - ' + name, area: ['500px', '500px'], content: html,
                    success: function() {
                        $('#sendBtn').on('click', sendMsg);
                        $('#chatInput').on('keypress', function(e) { if (e.which === 13) sendMsg(); });
                        function sendMsg() {
                            var msg = $('#chatInput').val().trim();
                            if (!msg) return;
                            $('#chatBox').append('<div class="chat-msg user"><div class="chat-bubble">' + msg + '</div></div>');
                            $('#chatInput').val('');
                            $('#chatBox').append('<div class="chat-msg ai" id="loading"><div class="chat-loading">AI思考中...</div></div>');
                            $('#chatBox').scrollTop($('#chatBox')[0].scrollHeight);
                            $.post('/admin/api/model/test', $.extend({model_id: id, message: msg}, {_xsrf: xsrfToken}), function(res) {
                                $('#loading').remove();
                                if (res.code === 0) {
                                    $('#chatBox').append('<div class="chat-msg ai"><div class="chat-bubble">' + res.data.content.replace(/\n/g, '<br>') + '</div></div>');
                                } else {
                                    $('#chatBox').append('<div class="chat-msg ai"><div class="chat-bubble" style="color:#ef4444;">错误: ' + res.msg + '</div></div>');
                                }
                                $('#chatBox').scrollTop($('#chatBox')[0].scrollHeight);
                            }, 'json');
                        }
                    }
                });
            };

            function showForm(data) {
                var isEdit = data !== null;
                var html = '<form class="layui-form" id="modelForm" lay-filter="modelForm" style="padding:20px;">' +
                    '<input type="hidden" name="id" value="">' +
                    '<div class="layui-form-item"><label class="layui-form-label">模型名称</label><div class="layui-input-block">' +
                    '<input type="text" name="name" required lay-verify="required" placeholder="如：DeepSeek-V3" class="layui-input"></div></div>' +
                    '<div class="layui-form-item"><label class="layui-form-label">模型编码</label><div class="layui-input-block">' +
                    '<input type="text" name="code" required lay-verify="required" placeholder="如：deepseek_v3" class="layui-input"></div></div>' +
                    '<div class="layui-form-item"><label class="layui-form-label">Base URL</label><div class="layui-input-block">' +
                    '<input type="text" name="base_url" required lay-verify="required" placeholder="https://..." class="layui-input"></div></div>' +
                    '<div class="layui-form-item"><label class="layui-form-label">API Key</label><div class="layui-input-block">' +
                    '<input type="text" name="api_key" required lay-verify="required" placeholder="sk-..." class="layui-input"></div></div>' +
                    '<div class="layui-form-item"><label class="layui-form-label">Model Name</label><div class="layui-input-block">' +
                    '<input type="text" name="model_name" required lay-verify="required" placeholder="如：deepseek-v3" class="layui-input"></div></div>' +
                    '<div class="layui-form-item"><label class="layui-form-label">描述</label><div class="layui-input-block">' +
                    '<textarea name="description" class="layui-textarea"></textarea></div></div>' +
                    '<div class="layui-form-item"><label class="layui-form-label">排序</label><div class="layui-input-block">' +
                    '<input type="number" name="sort" value="0" class="layui-input"></div></div>' +
                    '<div class="layui-form-item"><label class="layui-form-label">状态</label><div class="layui-input-block">' +
                    '<input type="radio" name="status" value="1" title="启用" checked> <input type="radio" name="status" value="0" title="停用"></div></div>' +
                    '<div class="layui-form-item"><label class="layui-form-label">设为默认</label><div class="layui-input-block">' +
                    '<input type="checkbox" name="is_default" lay-skin="switch" lay-text="是|否" value="1"></div></div>' +
                    '<div class="layui-form-item"><div class="layui-input-block">' +
                    '<button class="layui-btn" lay-submit lay-filter="submit">确定</button> <button type="reset" class="layui-btn layui-btn-primary">重置</button></div></div></form>';
                layer.open({
                    type: 1, title: isEdit ? '编辑模型' : '新增模型', area: ['550px', '650px'], content: html,
                    success: function() {
                        form.render();
                        if (isEdit) {
                            var fd = data;
                            fd.is_default = fd.is_default == 1;
                            form.val('modelForm', fd);
                            $('input[name="code"]').prop('readonly', true).css('background', '#334155');
                        }
                    }
                });
                form.on('submit(submit)', function(fd) {
                    var field = fd.field;
                    var url = isEdit ? '/admin/api/model/edit' : '/admin/api/model/add';
                    field.id = isEdit ? data.id : '';
                    field._xsrf = xsrfToken;
                    field.is_default = field.is_default === 'on' ? 1 : 0;
                    $.post(url, field, function(res) {
                        layer.msg(res.msg, {icon: res.code === 0 ? 1 : 2});
                        if (res.code === 0) { layer.closeAll(); renderPage(currentPage); }
                    }, 'json');
                    return false;
                });
            }

            renderPage(1);
        });
    </script>
</body>
</html>
